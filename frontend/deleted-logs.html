<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Deletion Logs - DRDO CABS</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/auth-check.js"></script>
</head>

<body>

<div class="navbar">
    <div class="logo">
        <div class="logo-circle"></div>
        <h2>DRDO CABS</h2>
    </div>
    <div class="nav-links">
        <span class="role-badge" id="userRole"></span>
        <a id="dashboardLink" href="/static/dashboard.html">Dashboard</a>
        <a id="addItemLink" href="/static/edit.html">Add Item</a>
        <a id="deletedLogsLink" href="/static/deleted-logs.html">Deleted Logs</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>

<div class="container">

    <div class="card">

        <h1 class="title">Deletion Logs</h1>

        <input
            type="text"
            id="searchInput"
            class="search-bar"
            placeholder="Search..."
            onkeyup="filterLogs()"
        />

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Asset</th>
                        <th>Serial No</th>
                        <th>Location</th>
                        <th>User</th>
                        <th>Room No</th>
                        <th>Division</th>
                        <th>Asset Owner</th>
                        <th>Model</th>
                        <th>Network</th>
                        <th>Status</th>
                        <th>Procurement</th>
                        <th>Deleted By</th>
                        <th>Deleted At</th>
                    </tr>
                </thead>
                <tbody id="deletionTable">
                </tbody>
            </table>
        </div>

    </div>

</div>

<script src="/static/js/deleted-logs.js"></script>

</body>
</html>
