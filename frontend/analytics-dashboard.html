<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Analytics Dashboard - DRDO CABS</title>
    <link rel="stylesheet" href="/static/css/analytics-dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="navbar">
    <div class="logo">
        <div class="logo-circle"></div>
        <h2>DRDO CABS</h2>
    </div>
    <div class="nav-links">
        <span class="role-badge" id="userRole"></span>
        <a href="/static/dashboard.html">Dashboard</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>

<div class="container">
    <div class="card analytics-card">
        <div class="analytics-header">
            <h1 class="title">📊 Analytics Dashboard</h1>
            <p class="subtitle">Asset Management Analytics</p>
            <div class="header-actions">
                <button class="btn-primary" onclick="refreshDashboard()">🔄 Refresh</button>
                <button class="btn-secondary" onclick="goToDashboard()">← Back to Dashboard</button>
            </div>
        </div>

        <!-- KPI Cards Section -->
        <div class="kpi-section">
            <div class="kpi-card">
                <div class="kpi-icon">📦</div>
                <div class="kpi-content">
                    <p class="kpi-label">Total Assets</p>
                    <p class="kpi-value" id="totalAssets">-</p>
                </div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="charts-section">
            <!-- Asset Count by Type -->
            <div class="chart-card">
                <h2 class="chart-title">Assets by Type</h2>
                <canvas id="assetsByTypeChart"></canvas>
            </div>

            <!-- Asset Count by Location -->
            <div class="chart-card">
                <h2 class="chart-title">Assets by Location</h2>
                <canvas id="assetsByLocationChart"></canvas>
            </div>

            <!-- Asset Count by Status -->
            <div class="chart-card">
                <h2 class="chart-title">Assets by Status</h2>
                <canvas id="assetsByStatusChart"></canvas>
            </div>

            <!-- Asset Count by Division -->
            <div class="chart-card">
                <h2 class="chart-title">Assets by Division</h2>
                <canvas id="assetsByDivisionChart"></canvas>
            </div>
        </div>

        <!-- Status Message -->
        <div class="status-message" id="statusMessage"></div>
    </div>
</div>

<script>
    // Get token and sessionId from storage
    const token = localStorage.getItem("token");
    const sessionId = localStorage.getItem("sessionId");

    // Session validation
    function validateSession() {
        if (!token || !sessionId) {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = "/?t=" + Date.now();
            return false;
        }

        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            const currentTime = Math.floor(Date.now() / 1000);
            if (payload.exp < currentTime) {
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = "/?t=" + Date.now();
                return false;
            }
        } catch (e) {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = "/?t=" + Date.now();
            return false;
        }
        return true;
    }

    if (!validateSession()) {
        document.documentElement.innerHTML = "";
        throw new Error("Session invalid");
    }

    // Parse JWT
    function parseJwt(token) {
        return JSON.parse(atob(token.split('.')[1]));
    }

    const payload = parseJwt(token);
    const userRole = payload.role;
    document.getElementById("userRole").innerText = `Role: ${userRole}`;

    // Logout function
    function logout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = "/?t=" + Date.now();
    }

    // Chart instances
    let charts = {
        assetsByType: null,
        assetsByLocation: null,
        assetsByStatus: null,
        assetsByDivision: null
    };

    // Fetch dashboard data from API
    async function fetchDashboardData() {
        try {
            const response = await fetch('/analytics/dashboard', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                if (response.status === 403) {
                    showMessage('Access denied. Super-admin privileges required.', 'error');
                    setTimeout(() => window.location.href = '/static/dashboard.html?t=' + sessionId, 2000);
                } else if (response.status === 401) {
                    showMessage('Session expired. Please log in again.', 'error');
                    setTimeout(() => window.location.href = '/?t=' + Date.now(), 2000);
                } else {
                    showMessage(`Error: ${response.statusText}`, 'error');
                }
                return null;
            }

            const data = await response.json();
            return data;
        } catch (error) {
            console.error('Error fetching dashboard data:', error);
            showMessage('Failed to load dashboard data', 'error');
            return null;
        }
    }

    // Update KPI card
    function updateKPICards(data) {
        document.getElementById('totalAssets').textContent = data.total_assets || 0;
    }

    // Destroy existing chart if it exists
    function destroyChart(chartId) {
        if (charts[chartId] && charts[chartId].chart) {
            charts[chartId].chart.destroy();
        }
    }

    // Create/Update Assets by Type Chart
    function updateAssetsByTypeChart(data) {
        destroyChart('assetsByType');
        
        const ctx = document.getElementById('assetsByTypeChart').getContext('2d');
        const labels = data.by_type.map(item => item.asset_type);
        const values = data.by_type.map(item => item.count);
        const colors = [
            '#0ea5e9', '#06b6d4', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'
        ];

        charts.assetsByType = {
            chart: new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Asset Count',
                        data: values,
                        backgroundColor: colors.slice(0, values.length),
                        borderColor: colors.slice(0, values.length),
                        borderWidth: 0,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1, color: '#94a3b8' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { display: false }
                        }
                    }
                }
            })
        };
    }

    // Create/Update Assets by Location Chart
    function updateAssetsByLocationChart(data) {
        destroyChart('assetsByLocation');
        
        const ctx = document.getElementById('assetsByLocationChart').getContext('2d');
        const locations = data.by_location.map(item => item.location);
        const values = data.by_location.map(item => item.count);
        
        const colors = [
            '#0ea5e9', '#06b6d4', '#10b981', '#f59e0b', '#ef4444',
            '#8b5cf6', '#ec4899', '#f97316', '#06b6d4', '#14b8a6'
        ];

        charts.assetsByLocation = {
            chart: new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: locations,
                    datasets: [{
                        data: values,
                        backgroundColor: colors.slice(0, values.length),
                        borderColor: '#0f172a',
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { color: '#e2e8f0' }
                        }
                    }
                }
            })
        };
    }

    // Create/Update Assets by Status Chart
    function updateAssetsByStatusChart(data) {
        destroyChart('assetsByStatus');
        
        const ctx = document.getElementById('assetsByStatusChart').getContext('2d');
        const labels = data.by_status.map(item => item.status);
        const values = data.by_status.map(item => item.count);
        
        const statusColors = {
            'Inuse': '#10b981',
            'put-up for condemnd': '#f59e0b',
            'condemnd': '#ef4444'
        };
        
        const colors = labels.map(status => statusColors[status] || '#0ea5e9');

        charts.assetsByStatus = {
            chart: new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderColor: '#0f172a',
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#e2e8f0' }
                        }
                    }
                }
            })
        };
    }

    // Create/Update Assets by Division Chart
    function updateAssetsByDivisionChart(data) {
        destroyChart('assetsByDivision');
        
        const ctx = document.getElementById('assetsByDivisionChart').getContext('2d');
        const labels = data.by_division.map(item => item.division);
        const values = data.by_division.map(item => item.count);
        
        const colors = [
            '#0ea5e9', '#06b6d4', '#10b981', '#f59e0b', '#ef4444',
            '#8b5cf6', '#ec4899', '#f97316', '#06b6d4', '#14b8a6'
        ];

        charts.assetsByDivision = {
            chart: new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Asset Count',
                        data: values,
                        backgroundColor: colors.slice(0, values.length),
                        borderColor: colors.slice(0, values.length),
                        borderWidth: 0,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    indexAxis: 'y',
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            ticks: { color: '#94a3b8' },
                            grid: { display: false }
                        }
                    }
                }
            })
        };
    }

    // Show status message
    function showMessage(message, type = 'info') {
        const msgElement = document.getElementById('statusMessage');
        msgElement.textContent = message;
        msgElement.className = `status-message show ${type}`;
        
        if (type !== 'error') {
            setTimeout(() => {
                msgElement.classList.remove('show');
            }, 3000);
        }
    }

    // Refresh dashboard data
    async function refreshDashboard() {
        const data = await fetchDashboardData();
        if (data) {
            updateKPICards(data);
            updateAssetsByTypeChart(data);
            updateAssetsByLocationChart(data);
            updateAssetsByStatusChart(data);
            updateAssetsByDivisionChart(data);
            showMessage('Dashboard updated successfully', 'success');
        }
    }

    // Go back to main dashboard with sessionId
    function goToDashboard() {
        window.location.href = '/static/dashboard.html?t=' + sessionId;
    }

    // Initialize dashboard on page load
    async function initializeDashboard() {
        showMessage('Loading analytics data...', 'info');
        await refreshDashboard();
        
        // Set up auto-refresh every 10 seconds
        setInterval(async () => {
            const data = await fetchDashboardData();
            if (data) {
                updateKPICards(data);
                updateAssetsByTypeChart(data);
                updateAssetsByLocationChart(data);
                updateAssetsByStatusChart(data);
                updateAssetsByDivisionChart(data);
            }
        }, 10000);
    }

    // Validate and prevent cache
    window.addEventListener('pageshow', function(event) {
        validateSession();
    });

    // Load dashboard when page is ready
    document.addEventListener('DOMContentLoaded', initializeDashboard);
</script>
</body>
</html>
